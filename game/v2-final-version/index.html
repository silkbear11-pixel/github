<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Pig</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <script src="script.js" defer></script>
</head>

<body>

  <div class="stage">

    <div class="topbar">
      <a class="pill navbtn" href="indexhome.html">Home</a>
      <h1>Game of Pig</h1>
      <a class="pill navbtn" href="index.html">Reset</a>
    </div>

    <div class="main">

      <div class="tablewrap">
        <div class="table casino">
          <div class="table-felt">

            <div id="game" class="diceholder">

              <div class="die" id="die1" data-face="1">
                <span class="dot d1"></span>
                <span class="dot d2"></span>
                <span class="dot d3"></span>
                <span class="dot d4"></span>
                <span class="dot d5"></span>
                <span class="dot d6"></span>
                <span class="dot d7"></span>
                <span class="dot d8"></span>
                <span class="dot d9"></span>
              </div>

              <div class="die" id="die2" data-face="1">
                <span class="dot d1"></span>
                <span class="dot d2"></span>
                <span class="dot d3"></span>
                <span class="dot d4"></span>
                <span class="dot d5"></span>
                <span class="dot d6"></span>
                <span class="dot d7"></span>
                <span class="dot d8"></span>
                <span class="dot d9"></span>
              </div>

            </div>

          </div>
        </div>
      </div>

      <div class="bottomrow">

        <div id="score" class="scorebox">
          <h2>Score</h2>
          <p>P1: 0</p>
          <p>P2: 0</p>
        </div>

        <div class="messagebox">
          <p id="status" class="status">Press Roll to begin.</p>
        </div>

        <div class="actionbox">
          <button id="roll" class="pill actionbtn">Roll</button>
          <button id="pass" class="pill actionbtn">Pass</button>
        </div>

      </div>

    </div>

    <div class="audio-ui">
      <label for="volume">Volume</label>
      <input type="range" id="volume" min="0" max="100" value="70">
    </div>

  </div>

</body>
</html>
