<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Pig</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <script src="script.js" defer></script>
</head>

<body>

  <div class="stage">

    <div class="topbar">
      <a class="pill" href="indexhome.html">Home</a>
      <h1>Game of Pig</h1>

      <div class="right">
        <button id="quit" class="pill">Quit</button>
      </div>
    </div>

    <div class="tablewrap">
      <div class="table">
        <div id="game"></div>
      </div>
    </div>

    <div class="bottomrow">

      <div id="score" class="scorebox">
        <h2>Score</h2>
        <p>P1: 0</p>
        <p>P2: 0</p>
      </div>

      <div class="messagebox">
        <p id="status">Press Roll to begin.</p>
      </div>

      <div id="actions" class="actionbox">
        <button id="roll" class="pill">Roll</button>
      </div>

    </div>

  </div>

</body>
</html>
