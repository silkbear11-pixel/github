<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Pig</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body>

  <div class="stage">

    <div class="topbar">
      <a class="pill" href="indexhome.html">Home</a>
      <h1>Game of Pig</h1>
      <a class="pill" href="index.html">Reset</a>
    </div>

    <div class="tablewrap">
      <div class="table">
        <div class="diceholder">
          <div class="die"></div>
          <div class="die"></div>
        </div>
      </div>
    </div>

    <div class="bottomrow">

      <div class="scorebox">
        <h2>Score</h2>
        <p>P1: 0</p>
        <p>P2: 0</p>
      </div>

      <div class="messagebox">
        <p class="status">Press Roll to begin.</p>
      </div>

      <div class="actionbox">
        <a class="pill actionbtn" href="#">Roll</a>
        <a class="pill actionbtn" href="#">Pass</a>
      </div>

    </div>

  </div>

</body>
</html>
